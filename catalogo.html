<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — Los Crovas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#1A1208;--parch:#F0E9D6;--parch2:#E4D9BC;--ember:#9E3A12;--smoke:#7A6A54;--border:rgba(80,50,20,0.15);--deep:#140E06}
html{scroll-behavior:smooth}
body{background:var(--parch);color:var(--ink);font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:16px;min-height:100vh;font-weight:400;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
img{opacity:0;transition:opacity 0.4s}
img.loaded{opacity:1}
nav{position:sticky;top:0;z-index:100;background:rgba(240,233,214,0.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem}
.nav-brand{font-family:'IM Fell English',serif;font-size:1.1rem;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:0.4rem;flex-shrink:0}
.nav-brand em{font-style:italic;color:var(--ember)}
.nav-back{font-size:0.66rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--smoke);text-decoration:none;white-space:nowrap;font-weight:500}
.nav-back:hover{color:var(--ember)}
.nav-ig{display:flex;align-items:center;gap:0.35rem;font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ember);text-decoration:none;white-space:nowrap;font-weight:500}
.cat-header{padding:2.5rem 1.5rem 1.2rem;border-bottom:1px solid var(--border)}
.cat-header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,7vw,3.4rem);line-height:1;color:var(--ink);font-weight:600}
.cat-header h1 em{font-style:italic;color:var(--ember);font-weight:500}
.cat-header p{font-size:0.92rem;color:#3D2914;margin-top:0.7rem;font-weight:400}
.filtros-wrap{position:sticky;top:57px;z-index:90;background:rgba(240,233,214,0.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filtros-wrap::-webkit-scrollbar{display:none}
.filtros-inner{display:flex;gap:0.5rem;width:max-content}
.filtro{padding:0.4rem 1rem;border:1px solid var(--border);font-size:0.66rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--smoke);cursor:pointer;background:transparent;font-family:'Inter',sans-serif;border-radius:2px;transition:all 0.2s;white-space:nowrap;font-weight:500}
.filtro:hover,.filtro.active{border-color:var(--ember);color:var(--ember);background:rgba(158,58,18,0.06)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.pip{background:var(--parch);cursor:pointer;transition:background 0.2s;overflow:hidden}
.pip:hover,.pip:active{background:var(--parch2)}
.pip-thumb{position:relative;overflow:hidden;background:var(--parch2);line-height:0;aspect-ratio:1}
.pip-thumb img{width:100%;height:100%;object-fit:contain;background:var(--parch2);display:block;transition:transform 0.3s;padding:8px}
.pip:hover .pip-thumb img{transform:scale(1.03)}
.pip-thumb-overlay{position:absolute;inset:0;background:rgba(20,14,6,0);transition:background 0.2s}
.pip:hover .pip-thumb-overlay{background:rgba(20,14,6,0.08)}
.pip-info{padding:0.85rem 0.95rem;border-top:1px solid var(--border)}
.pip-cat{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--smoke);margin-bottom:0.25rem;font-weight:500}
.pip-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--ink);line-height:1.2;font-weight:600}
.pip-price{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ember);font-size:0.95rem;margin-top:0.3rem;font-weight:500}
.pip-vendida{opacity:0.5}
.cat-empty{grid-column:span 2;text-align:center;padding:4rem 2rem;color:var(--smoke);font-weight:400}
.ig-cta{padding:2.5rem 1.5rem;text-align:center;border-top:1px solid var(--border);background:var(--parch2)}
.ig-cta p{font-size:0.95rem;color:#3D2914;margin-bottom:1.2rem;font-weight:400}
.ig-btn{display:inline-flex;align-items:center;gap:0.6rem;padding:0.85rem 2.2rem;border:1px solid var(--border);font-family:'Inter',sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ember);text-decoration:none;transition:all 0.2s;font-weight:500}
.ig-btn:hover{border-color:var(--ember);background:var(--parch)}
footer{padding:1.5rem;text-align:center;background:var(--deep)}
footer p{font-size:0.62rem;letter-spacing:0.16em;color:rgba(240,233,214,0.25);text-transform:uppercase;font-weight:400}
.modal-overlay{position:fixed;inset:0;background:rgba(20,14,6,0.8);z-index:1000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--parch);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border-radius:12px 12px 0 0;position:relative}
.modal-handle{display:flex;justify-content:center;padding:0.75rem;cursor:pointer}
.modal-handle::before{content:'';width:40px;height:4px;background:var(--border);border-radius:2px}
.modal-close-btn{position:absolute;top:0.5rem;right:0.75rem;background:var(--ink);color:var(--parch);border:none;width:30px;height:30px;font-size:1rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.modal-imgs{position:relative;background:var(--parch2);line-height:0}
.modal-slides{display:flex;transition:transform 0.35s ease}
.modal-slide{min-width:100%;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:var(--parch2)}
.modal-slide img{max-width:100%;max-height:280px;object-fit:contain;display:block}
.modal-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(240,233,214,0.9);border:1px solid var(--border);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--ink);z-index:5}
.modal-btn.prev{left:8px}
.modal-btn.next{right:8px}
.modal-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.modal-dot{width:5px;height:5px;border-radius:50%;background:rgba(26,18,8,0.25);cursor:pointer;border:none;transition:background 0.2s}
.modal-dot.active{background:var(--ember)}
.modal-detail{padding:1.5rem}
.modal-cat{font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--smoke);margin-bottom:0.3rem;font-weight:500}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--ink);line-height:1.1;margin-bottom:0.6rem;font-weight:600}
.modal-desc{font-size:0.95rem;color:#3D2914;line-height:1.65;margin-bottom:0.9rem;font-weight:400}
.modal-precio{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-style:italic;color:var(--ember);margin-bottom:1.1rem;font-weight:500}
.modal-wa{display:flex;align-items:center;justify-content:center;gap:0.7rem;padding:1rem 2rem;background:var(--ink);color:var(--parch);font-family:'Inter',sans-serif;font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;text-decoration:none;transition:background 0.2s;border:none;cursor:pointer;width:100%;font-weight:500}
.modal-wa:hover,.modal-wa:active{background:var(--ember)}
.modal-vendida-txt{padding:0.9rem 1.2rem;background:var(--parch2);border-left:3px solid var(--smoke);font-size:0.9rem;color:var(--smoke);margin-bottom:1rem;font-weight:400}
.modal-pagos{margin-top:1rem;padding-top:1.1rem;border-top:1px solid var(--border)}
.modal-pagos-title{font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--smoke);margin-bottom:0.7rem;font-weight:500}
.modal-pagos-items{display:flex;flex-wrap:wrap;gap:0.6rem}
.modal-pago-item{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:#3D2914;font-weight:400}
@media(min-width:700px){
  nav{padding:1rem 3rem}
  .cat-header{padding:3.5rem 3rem 1.8rem}
  .filtros-wrap{padding:0.75rem 3rem;top:61px}
  .cat-grid{grid-template-columns:repeat(3,1fr)}
  .cat-empty{grid-column:span 3}
  .modal-overlay{align-items:center}
  .modal-box{border-radius:4px;max-height:85vh}
  .modal-handle{display:none}
  .modal-slide img{max-height:380px}
  .ig-cta{padding:3rem}
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/"><img src="img/logo.png" alt="Los Crovas" style="width:26px;height:26px;object-fit:contain;opacity:0.9;margin-right:0.3rem">Los <em>Crovas</em></a>
  <a class="nav-back" href="/">&#8592; Inicio</a>
  <a class="nav-ig" href="https://www.instagram.com/los.crovas/" target="_blank" rel="noopener">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
    @los.crovas
  </a>
</nav>

<div class="cat-header">
  <h1>Cat&aacute;logo <em>actual</em></h1>
  <p>Todas las pipas disponibles &middot; Alto R&iacute;o Percy, Patagonia</p>
</div>

<div class="filtros-wrap">
  <div class="filtros-inner" id="filtros-inner">
    <button class="filtro active" onclick="activarFiltro(this, 'todas')">Todas</button>
  </div>
</div>

<div class="cat-grid" id="cat-grid">
  <div class="cat-empty">Cargando...</div>
</div>

<div class="ig-cta">
  <p>&iquest;Quer&eacute;s ver m&aacute;s? Segu&iacute; a Javier en Instagram</p>
  <a class="ig-btn" href="https://www.instagram.com/los.crovas/" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.9" fill="currentColor" stroke="none"/></svg>
    Ver Instagram &#8594;
  </a>
</div>

<footer><p>Sitio creado por Crova Studio</p></footer>

<div class="modal-overlay" id="modal" onclick="cerrarModalBg(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-handle" onclick="cerrarModal()"></div>
    <button class="modal-close-btn" onclick="cerrarModal()">&#10005;</button>
    <div class="modal-imgs">
      <div class="modal-slides" id="modal-slides"></div>
      <button class="modal-btn prev" id="modal-prev" onclick="modalSlide(-1)">&#8249;</button>
      <button class="modal-btn next" id="modal-next" onclick="modalSlide(1)">&#8250;</button>
      <div class="modal-dots" id="modal-dots"></div>
    </div>
    <div class="modal-detail">
      <p class="modal-cat" id="modal-cat"></p>
      <h2 class="modal-name" id="modal-name"></h2>
      <p class="modal-desc" id="modal-desc"></p>
      <p class="modal-precio" id="modal-precio"></p>
      <div id="modal-action"></div>
      <div class="modal-pagos">
        <p class="modal-pagos-title">M&eacute;todos de pago</p>
        <div class="modal-pagos-items">
          <div class="modal-pago-item"><svg width="18" height="18" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="#009EE3"/><text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="8" font-family="Arial" font-weight="bold">MP</text></svg><span>Mercado Pago</span></div>
          <div class="modal-pago-item"><svg width="18" height="18" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="#2C3E50"/><path d="M8 20h24M20 8v24" stroke="white" stroke-width="3" stroke-linecap="round"/></svg><span>Transferencia</span></div>
          <div class="modal-pago-item"><svg width="18" height="18" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="#00457C"/><text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="7" font-family="Arial" font-weight="bold">PayPal</text></svg><span>PayPal</span></div>
          <div class="modal-pago-item"><svg width="18" height="18" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="#3D5228"/><text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="8" font-family="Arial" font-weight="bold">$</text></svg><span>Efectivo</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var WA = '5492945555812';
var todasLasPipas = [];
var pipasStore = [];
var modalCurrentSlide = 0;
var modalTotalSlides = 0;

function formatearPrecio(precio) {
  if (!precio) return 'Consultar';
  var num = parseInt(precio.toString().replace(/[^0-9]/g, ''));
  if (isNaN(num)) return 'Consultar';
  return '$' + num.toLocaleString('es-AR');
}

function mensajeWA(nombre, descripcion) {
  var msg = 'Hola Javier! Me interesa la ' + nombre + ' (' + descripcion + '). La vi en loscrovas.com.ar';
  return 'https://wa.me/' + WA + '?text=' + encodeURIComponent(msg);
}

function getFotos(pipa) {
  if (Array.isArray(pipa.fotos) && pipa.fotos.length > 0) return pipa.fotos;
  if (pipa.foto) return pipa.foto.split(',').map(function(f){ return f.trim(); }).filter(Boolean);
  return ['img/sticker.png'];
}

function imgError(img) { img.src = 'img/sticker.png'; }

function lazyLoad(container) {
  container.querySelectorAll('img').forEach(function(img) {
    if (img.complete) img.classList.add('loaded');
    else img.addEventListener('load', function(){ img.classList.add('loaded'); });
  });
}

function crearTarjeta(pipa, index) {
  var nombre = pipa.nombre || '';
  var categoria = pipa.categoria || '';
  var precio = pipa.precio;
  var disponible = pipa.disponible || 'NO';
  var vendida = disponible.toString().toUpperCase().trim() !== 'SI';
  var fotos = getFotos(pipa);
  pipasStore[index] = { nombre: nombre, categoria: categoria, descripcion: pipa.descripcion || '', precio: precio, disponible: disponible, fotos: fotos };
  var cls = vendida ? 'pip pip-vendida' : 'pip';
  var priceHtml = vendida ? 'Vendida' : formatearPrecio(precio);
  var html = '<div class="' + cls + '" onclick="abrirModal(' + index + ')">';
  html += '<div class="pip-thumb">';
  html += '<img src="' + fotos[0] + '" alt="' + nombre + '" loading="lazy" onerror="imgError(this)">';
  html += '<div class="pip-thumb-overlay"></div>';
  html += '</div>';
  html += '<div class="pip-info">';
  html += '<p class="pip-cat">' + categoria + '</p>';
  html += '<p class="pip-name">' + nombre + '</p>';
  html += '<p class="pip-price">' + priceHtml + '</p>';
  html += '</div></div>';
  return html;
}

function renderCatalogo(filtro) {
  filtro = filtro || 'todas';
  var grid = document.getElementById('cat-grid');
  var pipas = filtro === 'todas' ? todasLasPipas : todasLasPipas.filter(function(p){
    return p.categoria && p.categoria.toLowerCase() === filtro.toLowerCase();
  });
  if (!pipas.length) {
    grid.innerHTML = '<div class="cat-empty">No hay pipas en esta categor&iacute;a.</div>';
    return;
  }
  var disponibles = pipas.filter(function(p){ return p.disponible && p.disponible.toString().toUpperCase().trim() === 'SI'; });
  var vendidas = pipas.filter(function(p){ return !p.disponible || p.disponible.toString().toUpperCase().trim() !== 'SI'; });
  grid.innerHTML = disponibles.concat(vendidas).map(function(p, i){ return crearTarjeta(p, i); }).join('');
  lazyLoad(grid);
}

function activarFiltro(btn, cat) {
  document.querySelectorAll('.filtro').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderCatalogo(cat);
}

function cargarCatalogo() {
  var grid = document.getElementById('cat-grid');
  fetch('/catalogo.json')
    .then(function(res){ return res.json(); })
    .then(function(pipas) {
      if (!pipas || !pipas.length) {
        grid.innerHTML = '<div class="cat-empty">El cat&aacute;logo se est&aacute; actualizando.</div>';
        return;
      }
      todasLasPipas = pipas.filter(function(p){ return p.nombre; });
      var cats = [];
      todasLasPipas.forEach(function(p){
        if (p.categoria && cats.indexOf(p.categoria) === -1) cats.push(p.categoria);
      });
      var fi = document.getElementById('filtros-inner');
      fi.innerHTML = '';
      var btnTodas = document.createElement('button');
      btnTodas.className = 'filtro active';
      btnTodas.textContent = 'Todas';
      btnTodas.setAttribute('onclick', "activarFiltro(this, 'todas')");
      fi.appendChild(btnTodas);
      cats.forEach(function(c){
        var btn = document.createElement('button');
        btn.className = 'filtro';
        btn.textContent = c;
        btn.setAttribute('onclick', "activarFiltro(this, '" + c + "')");
        fi.appendChild(btn);
      });
      renderCatalogo('todas');
    })
    .catch(function(){
      grid.innerHTML = '<div class="cat-empty">Error cargando. Visita nuestro Instagram.</div>';
    });
}

function abrirModal(index) {
  var pipa = pipasStore[index];
  if (!pipa) return;
  var fotos = pipa.fotos;
  var vendida = pipa.disponible.toString().toUpperCase().trim() !== 'SI';
  document.getElementById('modal-cat').textContent = pipa.categoria;
  document.getElementById('modal-name').textContent = pipa.nombre;
  document.getElementById('modal-desc').textContent = pipa.descripcion;
  document.getElementById('modal-precio').textContent = vendida ? '' : formatearPrecio(pipa.precio);
  modalCurrentSlide = 0;
  modalTotalSlides = fotos.length;
  var slidesEl = document.getElementById('modal-slides');
  slidesEl.innerHTML = '';
  fotos.forEach(function(src){
    var div = document.createElement('div');
    div.className = 'modal-slide';
    var img = document.createElement('img');
    img.src = src;
    img.alt = pipa.nombre;
    img.onerror = function(){ this.src = 'img/sticker.png'; };
    div.appendChild(img);
    slidesEl.appendChild(div);
  });
  slidesEl.style.transform = 'translateX(0)';
  lazyLoad(slidesEl);
  var dotsEl = document.getElementById('modal-dots');
  dotsEl.innerHTML = '';
  if (fotos.length > 1) {
    fotos.forEach(function(_, i){
      var btn = document.createElement('button');
      btn.className = 'modal-dot' + (i === 0 ? ' active' : '');
      btn.setAttribute('onclick', 'irModalSlide(' + i + ')');
      dotsEl.appendChild(btn);
    });
  }
  document.getElementById('modal-prev').style.display = fotos.length > 1 ? 'flex' : 'none';
  document.getElementById('modal-next').style.display = fotos.length > 1 ? 'flex' : 'none';
  var actionEl = document.getElementById('modal-action');
  if (vendida) {
    actionEl.innerHTML = '<div class="modal-vendida-txt">Esta pipa ya encontr&oacute; due&ntilde;o. Escribinos para ver opciones similares.</div>';
  } else {
    var a = document.createElement('a');
    a.href = mensajeWA(pipa.nombre, pipa.descripcion);
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'modal-wa';
    a.textContent = 'Consultar por WhatsApp';
    actionEl.innerHTML = '';
    actionEl.appendChild(a);
  }
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function cerrarModalBg(e) {
  if (e.target === document.getElementById('modal')) cerrarModal();
}

function modalSlide(dir) {
  modalCurrentSlide = (modalCurrentSlide + dir + modalTotalSlides) % modalTotalSlides;
  document.getElementById('modal-slides').style.transform = 'translateX(-' + (modalCurrentSlide * 100) + '%)';
  document.querySelectorAll('.modal-dot').forEach(function(d, i){ d.classList.toggle('active', i === modalCurrentSlide); });
}

function irModalSlide(i) {
  modalCurrentSlide = i;
  document.getElementById('modal-slides').style.transform = 'translateX(-' + (i * 100) + '%)';
  document.querySelectorAll('.modal-dot').forEach(function(d, j){ d.classList.toggle('active', j === i); });
}

document.addEventListener('keydown', function(e){ if(e.key === 'Escape') cerrarModal(); });
cargarCatalogo();
</script>
</body>
</html>
